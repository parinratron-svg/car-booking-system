services:
  db:
    image: mysql:8.0
    container_name: g05_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - course_proxy
      - appnetwork

  app:
    container_name: g05_app
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - '3005:3000'
    volumes:
      - ./public/uploads:/app/public/uploads
    restart: unless-stopped
    networks:
      - course_proxy
      - appnetwork

volumes:
  db_data:

networks:
  course_proxy:
  appnetwork:
