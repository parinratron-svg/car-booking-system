<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - ระบบจองรถ</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>🚗 ระบบจองรถ</h1>
      <p class="subtitle">Car Booking System</p>

      <div id="alertBox"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-control" placeholder="กรอก Username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="กรอก Password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">เข้าสู่ระบบ</button>
      </form>

      <div class="demo-accounts">
        <strong>บัญชีทดสอบ:</strong><br>
        Admin: <code>admin</code> / <code>admin123</code><br>
        User: <code>user1</code> / <code>user123</code>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (isLoggedIn()) {
      const user = getUser();
      window.location.href = user.role === 'admin' ? '/admin.html' : '/dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      const result = await apiRequest('/auth/login', {
        method: 'POST',
        body: JSON.stringify({ username, password }),
      });

      if (!result) return;

      if (result.success) {
        setAuth(result.data.token, result.data.user);
        window.location.href = result.data.user.role === 'admin' ? '/admin.html' : '/dashboard.html';
      } else {
        showAlert('alertBox', result.message);
      }
    });
  </script>
</body>
</html>
